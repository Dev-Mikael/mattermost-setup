apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure
  prune: true
  wait: true
  timeout: 15m0s
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-values
  # Only checks core deployments — NOT CRD-dependent resources
  # CRD-dependent resources (IPAddressPool, ClusterIssuer) are in
  # separate Kustomizations (metallb-config, cert-manager-config)
  # that dependsOn this one.
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: sealed-secrets
      namespace: flux-system
    - apiVersion: apps/v1
      kind: Deployment
      name: ingress-nginx-controller
      namespace: ingress-nginx
    - apiVersion: apps/v1
      kind: Deployment
      name: cert-manager
      namespace: cert-manager
    - apiVersion: apps/v1
      kind: Deployment
      name: mattermost-operator
      namespace: mattermost-operator
