apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure        # Operator + CRDs must exist first
    - name: metallb-config        # LoadBalancer IP must be assigned
    - name: cert-manager-config   # ClusterIssuers must exist for TLS
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps
  prune: true
  wait: true
  timeout: 15m0s
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-values
