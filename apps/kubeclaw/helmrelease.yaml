# apps/kubeclaw/helmrelease.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubeclaw
  namespace: flux-system
spec:
  type: oci
  url: oci://ghcr.io/imerica
  interval: 1h0m0s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeclaw
  namespace: kubeclaw
spec:
  interval: 10m0s
  timeout: 15m
  chart:
    spec:
      chart: kubeclaw
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: kubeclaw
        namespace: flux-system
      interval: 1h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback

  valuesFrom:
    - kind: Secret
      name: kubeclaw-secret
      valuesKey: LITELLM_MASTER_KEY
      targetPath: litellm.masterkey

  values:
    tailscale:
      ssh:
        enabled: false

    observability:
      enabled: false
      nodeCollector:
        enabled: false
      clickstack:
        enabled: false
      otelCollector:
        enabled: false

    secret:
      create: false
      existingSecretName: kubeclaw-secret

    litellm:
      enabled: true
      proxy_config:
        model_list:
          - model_name: "claude-sonnet-4-6"
            litellm_params:
              model: "anthropic/claude-sonnet-4-6"
              api_key: "os.environ/ANTHROPIC_API_KEY"
          - model_name: "gemini-2.5-pro"
            litellm_params:
              model: "gemini/gemini-2.5-pro"
              api_key: "os.environ/GEMINI_API_KEY"
        router_settings:
          routing_strategy: "simple-shuffle"
          num_retries: 2
          timeout: 120
      redis:
        enabled: true
      db:
        deployStandalone: false

    config:
      mode: merge
      desired: |
        {
          "gateway": {
            "mode": "local",
            "bind": "lan"
          },
          "agents": {
            "defaults": {
              "model": {
                "primary": "litellm/claude-sonnet-4-6"
              },
              "timeoutSeconds": 600,
              "maxConcurrent": 1
            },
            "list": [
              { "id": "main", "default": true }
            ]
          },
          "channels": {
            "mattermost": {
              "enabled": true,
              "baseUrl": "http://mattermost.mattermost.svc.cluster.local:8065",
              "chatmode": "oncall",
              "dmPolicy": "pairing",
              "allowFrom": [],
              "groupPolicy": "open",
              "commands": {
                "native": true,
                "nativeSkills": true,
                "callbackUrl": "http://kubeclaw-gateway.kubeclaw.svc.cluster.local:18789/api/channels/mattermost/command"
              }
            }
          }
        }

    egressFilter:
      enabled: true
      customConfig: |
        upstream:
          default:
            - 10.96.0.10
        conditional:
          mapping:
            cluster.local: 10.96.0.10
        ports:
          dns: 5353
          http: 4000
        blocking:
          blackLists:
            blockAll:
              - |
                *
          whiteLists:
            blockAll:
              - |
                api.anthropic.com
                generativelanguage.googleapis.com
                openclaw.modumichael.me

    networkPolicy:
      enabled: true
      ingressControllerNamespaceSelector:
        kubernetes.io/metadata.name: ingress-nginx