# apps/kubeclaw/helmrelease.yaml
#
# OCI HelmRepository — type: oci is required for ghcr.io OCI artifacts.
# The url is the registry+org prefix only; chart name is specified in HelmRelease.
# Flux resolves: oci://ghcr.io/imerica/kubeclaw:0.1.0
#
# UPGRADING: Edit version: below, commit, push. Chart pins image.tag + image.digest
# on every release so a version bump also upgrades the Gateway image deterministically.
#
# NOTE: The config.desired block below contains @@PLACEHOLDER@@ tokens.
# scripts/06-setup-kubeclaw.sh rewrites them with values from .env before
# committing this file to git. Do not edit the placeholder lines manually.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubeclaw
  namespace: flux-system
spec:
  type: oci
  url: oci://ghcr.io/imerica
  interval: 1h0m0s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeclaw
  namespace: kubeclaw
spec:
  interval: 10m0s
  chart:
    spec:
      chart: kubeclaw
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: kubeclaw
        namespace: flux-system
      interval: 1h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback

  # ── litellm.masterkey via valuesFrom ─────────────────────────────────────────
  # The masterkey is a required Helm chart value for the LiteLLM subchart.
  # Flux reads LITELLM_MASTER_KEY from the decrypted kubeclaw-secret and injects
  # it as the litellm.masterkey Helm value — never stored in plaintext in git.
  valuesFrom:
    - kind: Secret
      name: kubeclaw-secret
      valuesKey: LITELLM_MASTER_KEY
      targetPath: litellm.masterkey

  values:
    tailscale:
      ssh:
        enabled: false
    # ── Secrets ───────────────────────────────────────────────────────────────
    # Delegates secret management to the Sealed Secrets controller.
    # The chart mounts all kubeclaw-secret keys as env vars in Gateway + LiteLLM pods:
    #   OPENCLAW_GATEWAY_TOKEN  — Gateway UI auth token
    #   ANTHROPIC_API_KEY       — Claude API access (read by LiteLLM via os.environ/)
    #   GEMINI_API_KEY          — Gemini API access (read by LiteLLM via os.environ/)
    #   LITELLM_MASTER_KEY      — Internal Gateway↔LiteLLM auth (also injected via valuesFrom)
    #   MATTERMOST_BOT_TOKEN    — Bot account token (read by OpenClaw as MATTERMOST_BOT_TOKEN env var)
    secret:
      create: false
      existingSecretName: kubeclaw-secret

    # ── LiteLLM proxy ─────────────────────────────────────────────────────────
    # Deployed as an in-cluster proxy. The chart auto-injects:
    #   OPENAI_API_BASE=http://kubeclaw-litellm:4000/v1
    # into the Gateway pod so all LLM SDK calls route through it transparently.
    # API keys use os.environ/ references — resolved from env vars at pod runtime.
    litellm:
      enabled: true
      proxy_config:
        model_list:
          - model_name: "claude-sonnet-4-6"
            litellm_params:
              model: "anthropic/claude-sonnet-4-6"
              api_key: "os.environ/ANTHROPIC_API_KEY"
          - model_name: "gemini-2.5-pro"
            litellm_params:
              model: "gemini/gemini-2.5-pro"
              api_key: "os.environ/GEMINI_API_KEY"
        router_settings:
          routing_strategy: "simple-shuffle"
          num_retries: 2
          timeout: 120
      redis:
        enabled: true        # semantic response caching
      db:
        deployStandalone: false

    # ── OpenClaw config (bot behaviour) ───────────────────────────────────────
    # Applied at pod start via JSON merge-patch by an initContainer.
    # The @@PLACEHOLDER@@ tokens below are replaced by scripts/06-setup-kubeclaw.sh
    # with values derived from .env before this file is committed to git.
    #
    # Bot behaviour controlled by .env vars:
    #   MM_BOT_DM_POLICY   — "pairing" (default, per-user approval) or "open" (anyone)
    #   MM_BOT_CHANNELS    — comma-separated channel names to auto-join (e.g. town-square,general)
    #
    # chatmode: "oncall"
    #   Bot is silent in channels unless explicitly @mentioned.
    #   It always responds to DMs regardless of chatmode.
    #
    # groupPolicy: "open"
    #   Once the bot is a member of a channel (added by script 06 via API),
    #   it responds to @mentions from any user in that channel.
    #   Pair with chatmode "oncall" to avoid noise.
    #
    # dmPolicy: controlled by MM_BOT_DM_POLICY in .env
    #   "pairing" — first DM from an unknown user returns a pairing code.
    #               Admin approves via: scripts/07-manage-bot.sh approve
    #   "open"    — any Mattermost user can DM the bot without approval.
    #               Set allowFrom: ["*"] alongside this.
    #
    # MATTERMOST_BOT_TOKEN is NOT set here — OpenClaw reads it from the
    # MATTERMOST_BOT_TOKEN env var injected by kubeclaw-secret automatically.
    config:
      mode: merge
      desired: |
        {
          "agents": {
            "defaults": {
              "model": {
                "primary": "litellm/claude-sonnet-4-6"
              },
              "timeoutSeconds": 600,
              "maxConcurrent": 1
            },
            "list": [
              { "id": "main", "default": true }
            ]
          },
          "channels": {
            "mattermost": {
              "enabled": true,
              "baseUrl": "http://mattermost.mattermost.svc.cluster.local:8065",
              "chatmode": "oncall",
              "dmPolicy": "pairing",
              "groupPolicy": "open",
              "commands": {
                "native": true,
                "nativeSkills": true,
                "callbackUrl": "http://kubeclaw-gateway.kubeclaw.svc.cluster.local:18789/api/channels/mattermost/command"
              }
            }
          }
        }

    egressFilter:
      enabled: true
      allowlists:
        - |
          api.anthropic.com
          generativelanguage.googleapis.com

    # ── Network Policy ────────────────────────────────────────────────────────
    # Allows ingress from NGINX Ingress (OpenClaw subdomain).
    # networkpolicy-mattermost.yaml adds ingress from mattermost ns on :18789.
    networkPolicy:
      enabled: true
      ingressControllerNamespaceSelector:
        kubernetes.io/metadata.name: ingress-nginx
