apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubeclaw
  namespace: flux-system
spec:
  type: oci
  url: oci://ghcr.io/imerica
  interval: 1h0m0s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeclaw
  namespace: kubeclaw
spec:
  interval: 10m0s
  timeout: 15m
  chart:
    spec:
      chart: kubeclaw
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: kubeclaw
        namespace: flux-system
      interval: 1h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback

  # FIX: Persist gateway probe timeout increases so Flux reconciles don't
  # overwrite the manual kubectl patch. The chart does not expose these via
  # values, so we use postRenderers to patch the StatefulSet after render.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: kubeclaw-gateway
            patch: |
              - op: replace
                path: /spec/template/spec/containers/0/livenessProbe/timeoutSeconds
                value: 30
              - op: replace
                path: /spec/template/spec/containers/0/livenessProbe/periodSeconds
                value: 60
              - op: replace
                path: /spec/template/spec/containers/0/readinessProbe/timeoutSeconds
                value: 30

  valuesFrom:
    - kind: Secret
      name: kubeclaw-secret
      valuesKey: LITELLM_MASTER_KEY
      targetPath: litellm.masterkey

  values:
    tailscale:
      ssh:
        enabled: false

    observability:
      enabled: false
      nodeCollector:
        enabled: false
      clickstack:
        enabled: false
      otelCollector:
        enabled: false
      service:
      type: ClusterIP
      gatewayAPI:
        enabled: false
      ingress:
        enabled: true

    secret:
      create: false
      existingSecretName: kubeclaw-secret

    litellm:
      enabled: true
      proxy_config:
        litellm_settings:
          drop_params: true
        model_list:
          - model_name: "claude-sonnet-4-6"
            litellm_params:
              model: "anthropic/claude-sonnet-4-6"
              api_key: "os.environ/ANTHROPIC_API_KEY"
          - model_name: "gemini-2.5-pro"
            litellm_params:
              model: "gemini/gemini-2.5-pro"    # FIX: reverted from google/ (invalid) back to gemini/
              api_key: "os.environ/GEMINI_API_KEY"
              drop_params: true                  # FIX: per-model drop_params strips patternProperties/additionalProperties
        router_settings:
          routing_strategy: "simple-shuffle"
          num_retries: 2
          timeout: 120
      redis:
        enabled: true
      db:
        deployStandalone: false

    config:
      mode: merge
      desired: |
        {
          "models": {
            "mode": "merge",
            "providers": {
              "litellm": {
                "baseUrl": "http://kubeclaw-litellm:4000",
                "apiKey": "os.environ/LITELLM_MASTER_KEY",
                "api": "openai-completions",
                "models": [
                  {
                    "id": "claude-sonnet-4-6",
                    "name": "Claude Sonnet 4.6",
                    "reasoning": false,
                    "input": ["text", "image"],
                    "contextWindow": 200000,
                    "maxTokens": 8096
                  },
                  {
                    "id": "gemini-2.5-pro",
                    "name": "Gemini 2.5 Pro",
                    "reasoning": true,
                    "input": ["text", "image"],
                    "contextWindow": 1000000,
                    "maxTokens": 65536
                  }
                ]
              }
            }
          },
          "gateway": {
            "mode": "local",
            "bind": "lan"
          },
          "agents": {
            "defaults": {
              "model": {
                "primary": "litellm/gemini-2.5-pro"
              },
              "timeoutSeconds": 600,
              "maxConcurrent": 1
            },
            "list": [
              { "id": "main", "default": true }
            ]
          },
          "channels": {
            "mattermost": {
              "enabled": true,
              "baseUrl": "http://mattermost.mattermost.svc.cluster.local:8065",
              "chatmode": "oncall",
              "dmPolicy": "pairing",
              "allowFrom": [],
              "groupPolicy": "open",
              "commands": {
                "native": true,
                "nativeSkills": true,
                "callbackUrl": "http://kubeclaw-gateway.kubeclaw.svc.cluster.local:18789/api/channels/mattermost/command"
              }
            }
          }
        }

    # FIX: The chart ships a default customConfig that blocks * and only
    # whitelists github.com. The allowlists: field is ignored when customConfig
    # is present. We provide our own customConfig with:
    #   - conditional mapping to forward *.cluster.local directly to CoreDNS,
    #     bypassing the blocklist entirely (wildcard strings don't work in lists)
    #   - explicit allowlist for external AI provider endpoints
    egressFilter:
      enabled: true
      customConfig: |
        upstream:
          default:
            - 10.96.0.10
        conditional:
          mapping:
            cluster.local: 10.96.0.10
        ports:
          dns: 5353
          http: 4000
        blocking:
          blackLists:
            blockAll:
              - |
                *
          whiteLists:
            blockAll:
              - |
                api.anthropic.com
                generativelanguage.googleapis.com
                openclaw.modumichael.me

    networkPolicy:
      enabled: true
      ingressControllerNamespaceSelector:
        kubernetes.io/metadata.name: ingress-nginx