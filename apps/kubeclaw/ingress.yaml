# apps/kubeclaw/ingress.yaml
#
# Exposes the OpenClaw Gateway UI at openclaw.${DOMAIN}.
# ${DOMAIN} is substituted by Flux postBuild from the cluster-values ConfigMap —
# the same mechanism used by apps/mattermost/mattermost.yaml.
#
# DNS REQUIREMENT: Add an A record at your registrar before deploying:
#   Host: openclaw      Type: A      Value: <your server public IP>
#   (same public IP as the apex '@' record for modumichael.me)
#
# TLS: cert-manager will issue a Let's Encrypt certificate automatically.
# The certificate is stored in secret kubeclaw-tls in the kubeclaw namespace.
#
# AUTHENTICATION: The Gateway UI requires a bearer token. After the pod is Running:
#   kubectl -n kubeclaw get secret kubeclaw-secret \
#     -o jsonpath='{.data.OPENCLAW_GATEWAY_TOKEN}' | base64 -d
#   Open: https://openclaw.modumichael.me/#token=<token>
#
# WebSocket: proxy-http-version "1.1" is already set globally in the NGINX
# HelmRelease (infrastructure/nginx-ingress/helmrelease.yaml), so no per-ingress
# WebSocket annotation is required here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubeclaw
  namespace: kubeclaw
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  tls:
    - hosts:
        - openclaw.${DOMAIN}
      secretName: kubeclaw-tls
  rules:
    - host: openclaw.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubeclaw
                port:
                  number: 18789
