apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# sealed-kubeclaw-secret.yaml is generated by scripts/06-seal-kubeclaw.sh
# and committed here as an encrypted SealedSecret (safe to commit to git).
# The Sealed Secrets controller decrypts it into a real Secret at runtime.
#
# Run the sealing script before pushing apps/kubeclaw/ to your repo.
# If you push before sealing, Flux will reconcile the Kustomization successfully
# but the HelmRelease will remain Pending waiting for the Secret — this is expected.
# Run the script and push to unblock it.
resources:
  - sealed-kubeclaw-secret.yaml
