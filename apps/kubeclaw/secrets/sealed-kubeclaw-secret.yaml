# PLACEHOLDER — replaced by scripts/06-seal-kubeclaw.sh
#
# This file is committed as a structurally valid SealedSecret with empty
# encryptedData so Flux can apply the kustomization tree without schema errors
# before the real secret has been sealed. The Sealed Secrets controller will
# produce an empty Secret from this until the sealing script overwrites it.
#
# To generate the real secret:
#   1. Add the following to your .env:
#        OPENCLAW_GATEWAY_TOKEN=<strong-random-string>
#        ANTHROPIC_API_KEY=<your-anthropic-key>
#        GEMINI_API_KEY=<your-gemini-key>
#        LITELLM_MASTER_KEY=sk-<random-string>   # must start with sk-
#   2. Run: bash scripts/06-seal-kubeclaw.sh
#   3. Commit and push — this file will be overwritten with sealed ciphertext.
#
# MATTERMOST_BOT_TOKEN can be left empty on first run. Add it to .env and
# re-run the script after creating the bot account in Mattermost.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: kubeclaw-secret
  namespace: kubeclaw
spec:
  encryptedData: {}
  template:
    metadata:
      name: kubeclaw-secret
      namespace: kubeclaw
