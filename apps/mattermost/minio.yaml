# apps/mattermost/minio.yaml
# FIX: The Mattermost Operator always checks for the MinIO Operator CRD
# (MinIOInstance) regardless of your fileStore config. Since we are NOT
# installing the MinIO Operator, we deploy a standalone MinIO server instead
# and configure it as an "external" fileStore in the Mattermost CR.
# This completely avoids the "no matches for kind MinIOInstance" error.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: mattermost
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: mattermost
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          # Pin to a stable release — "latest" can pull large updates at inconvenient
          # times and was observed consuming excessive CPU on startup on t2 instances.
          image: minio/minio:RELEASE.2024-11-07T00-52-20Z
          imagePullPolicy: IfNotPresent
          args: [server, /data, --console-address, ":9001"]
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mattermost-minio-credentials
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mattermost-minio-credentials
                  key: secretkey
          volumeMounts:
            - name: minio-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            limits:
              cpu: 500m      # t2.medium has 2 vCPU; keep headroom for other pods
              memory: 512Mi  # MinIO needs more than 256Mi when handling uploads
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: mattermost
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# One-time Job that creates the "mattermost" bucket in MinIO
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: mattermost
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-11-05T11-29-45Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until mc alias set myminio http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; do
                echo "MinIO not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "MinIO ready. Creating bucket..."
              mc mb --ignore-existing myminio/mattermost
              echo "Bucket 'mattermost' is ready."
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mattermost-minio-credentials
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mattermost-minio-credentials
                  key: secretkey
