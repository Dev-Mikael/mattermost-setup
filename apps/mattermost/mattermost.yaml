# apps/mattermost/mattermost.yaml
# This is the Mattermost Custom Resource (CR) — the instruction given to the
# Mattermost Operator telling it how to deploy Mattermost.
#
# FIXES APPLIED:
#   1. Removed spec.resources — not a valid field in this operator version
#   2. Removed spec.ingress.ingressClassName — not in schema; use annotation instead
#   3. Removed nginx configuration-snippet annotation — disabled by NGINX webhook
#   4. Removed fileStore.operatorManaged — requires MinIO Operator CRD (not installed)
#   5. Used fileStore.external pointing to standalone MinIO deployment
#   6. MinIO URL has NO http:// prefix — operator adds the scheme internally
#   7. Uses kubernetes.io/ingress.class annotation (deprecated but works with this operator)
apiVersion: installation.mattermost.com/v1beta1
kind: Mattermost
metadata:
  name: mattermost
  namespace: mattermost
spec:
  # "100users" sets replicas=1 which is correct for a single-node cluster.
  # It does NOT set CPU/memory limits — those are controlled by mattermostEnv
  # and the resourcePatch below. For t3.medium (2 vCPU, 4GB) this is safe.
  # ⚠️  Do NOT use t2 instances (t2.medium/t2.large) — they use CPU credits
  #     which exhaust quickly under sustained load and throttle to ~0.4 vCPU.
  #     Use t3.medium or t3.large instead (unlimited CPU burst at no extra cost).
  size: 100users

  # ── Image (pinned for GitOps reproducibility) ─────────────
  image: mattermost/mattermost-team-edition
  version: "10.11.14"

  # ── Ingress ────────────────────────────────────────────────
  # ${DOMAIN} is substituted by Flux postBuild from cluster-values ConfigMap
  ingress:
    enabled: true
    host: ${DOMAIN}
    annotations:
      # FIX: Use deprecated annotation — spec.ingress.ingressClassName is not
      # in this operator version's schema and causes a dry-run failure
      kubernetes.io/ingress.class: nginx
      # TLS certificate via cert-manager + Let's Encrypt
      # For kind/local: comment out this annotation (no real cert possible)
      # For on-prem:    keep this — real TLS cert will be issued automatically
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      # FIX: configuration-snippet annotation is REMOVED.
      # It is blocked by the NGINX admission webhook by default.
      # WebSocket support is handled via global NGINX config in the HelmRelease.
    tlsSecret: mattermost-tls

  # ── Database ───────────────────────────────────────────────
  # Points to the SealedSecret which decrypts to a Secret containing
  # DB_CONNECTION_STRING used by the Mattermost pod
  database:
    external:
      secret: mattermost-db-credentials

  # ── File Storage ───────────────────────────────────────────
  # FIX: operatorManaged is REMOVED — it requires the MinIO Operator CRD
  # which we are not installing. Instead we point to our standalone MinIO.
  # FIX: URL has NO http:// prefix — the operator adds the scheme itself.
  #      Using http:// caused: "Endpoint url cannot have fully qualified paths"
  fileStore:
    external:
      url: minio.mattermost.svc.cluster.local:9000
      bucket: mattermost
      secret: mattermost-minio-credentials

  # ── App environment variables ─────────────────────────────
  mattermostEnv:
    # SITE URL must match EXACTLY what users type in their browser.
    # This drives: WebSocket connection, push proxy registration, OAuth redirects.
    # Wrong SITEURL = push proxy registration fails silently on first login.
    - name: MM_SERVICESETTINGS_SITEURL
      value: "https://${DOMAIN}"

    # ── Push notifications (mobile: iOS / Android) ──────────────────────────
    # Uses Mattermost's Hosted Push Notification Service (HPNS) — free for all
    # editions. Sends push notifications to official Mattermost mobile apps.
    # Requires: valid HTTPS (cert-manager must have issued a cert), and the
    # mobile app logged into the correct https://${DOMAIN} site URL.
    - name: MM_EMAILSETTINGS_SENDPUSHNOTIFICATIONS
      value: "true"
    # IMPORTANT — HPNS vs TPNS for Team Edition (free):
    # push.mattermost.com  = HPNS — requires paid Professional/Enterprise license.
    #   Using it on Team Edition causes "Notifications cannot be received from this
    #   server" on mobile. This is the #1 reported notification issue on the forums.
    # push-test.mattermost.com = TPNS — free, works with Team Edition, but Mattermost
    #   docs say it is for testing only (no production SLA).
    # For production with Team Edition, the real fix is to self-host the
    #   Mattermost Push Proxy (github.com/mattermost/mattermost-push-proxy).
    #
    # → Using TPNS here so notifications work out of the box for Team Edition.
    #   When you are ready to upgrade, swap this to https://push.mattermost.com
    #   after purchasing a Professional licence.
    - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONSERVER
      value: "https://push-test.mattermost.com"
    # "full" sends the actual message text in the push notification.
    # Use "generic" if privacy is a concern (shows "New message" only).
    - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONCONTENTS
      value: "full"
    - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONBUFFER
      value: "1000"
    # Send push when online, away, OR offline — catches all cases.
    # Default ("offline only") means you only get notified when completely offline,
    # which is why the boss sees nothing while the tab is open but not focused.
    - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONTRIGGERCONDITION
      value: "always"

    # ── Desktop / browser notifications ──────────────────────────────────────
    # Browser desktop popups (the OS-level notification toast) are Web Push
    # notifications triggered by the JavaScript client via the browser's
    # Notification API. The SERVER only needs to:
    #   1. Serve the app over HTTPS (required by browser security policy)
    #   2. Have SITE_URL set correctly (already set above)
    #   3. Have WebSocket working (handled by nginx proxy-http-version: 1.1)
    #
    # The user MUST also:
    #   - Allow notifications in their browser (click Allow when prompted)
    #   - In Mattermost: Account Settings → Notifications → Desktop → "All activity"
    #
    # These are the valid server-side settings that influence notification behaviour:
    # (Note: MM_NOTIFICATIONSETTINGS_DESKTOPNOTIFICATION is NOT a valid env var
    #  and is silently ignored — removed from this config.)
    - name: MM_EMAILSETTINGS_ENABLEEMAILBATCHING
      value: "false"   # Keep false; batching delays notifications
    - name: MM_SERVICESETTINGS_ENABLEUSERTYPINGMESSAGES
      value: "true"    # Typing indicators require WebSocket; confirms WS is working
    - name: MM_SERVICESETTINGS_ENABLECHANNELVIEWEDMESSAGES
      value: "true"    # Marks messages as read in real-time (needs WebSocket)
    - name: MM_SERVICESETTINGS_ALLOWCORSFROM
      value: ""        # Leave empty unless embedding in another origin
    # WebSocket keepalive — prevents proxies from closing idle connections.
    # Nginx read-timeout is 600s; set ping interval well below that.
    - name: MM_SERVICESETTINGS_WEBSOCKETURL
      value: ""        # Leave empty — Mattermost auto-derives from SITEURL
    - name: MM_SERVICESETTINGS_ALLOWEDUNTRUSTEDINTERNALCONNECTIONS
      value: "minio.mattermost.svc.cluster.local"  # Allow MinIO internal calls

    # ── Existing settings ─────────────────────────────────────────────────────
    - name: MM_LOGSETTINGS_CONSOLELEVEL
      value: "INFO"
    - name: MM_EMAILSETTINGS_ENABLESIGNINWITHEMAIL
      value: "true"
    - name: MM_EMAILSETTINGS_ENABLESIGNINWITHUSERNAME
      value: "true"
    - name: MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION
      value: "true"
    - name: MM_FILESETTINGS_AMAZONS3SSL
      value: "false"   # MinIO is internal HTTP — no SSL needed inside cluster

