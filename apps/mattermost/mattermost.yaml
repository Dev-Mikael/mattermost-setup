#   value: "noreply@${DOMAIN}"
# - name: MM_EMAILSETTINGS_REPLYTOADDRESS
#   value: "noreply@${DOMAIN}"
# Store SMTP credentials as a SealedSecret following the same pattern in 04-wait-and-seal.sh
