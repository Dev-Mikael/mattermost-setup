apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: mattermost
  namespace: flux-system
spec:
  interval: 1h0m0s
  url: https://helm.mattermost.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost-operator
  namespace: mattermost-operator
spec:
  interval: 10m0s
  chart:
    spec:
      chart: mattermost-operator
      version: ">=1.0.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: mattermost
        namespace: flux-system
      interval: 1h0m0s
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
  values:
    replicaCount: 1
    watchNamespace: ""
    serviceAccount:
      create: true
      name: mattermost-operator
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
