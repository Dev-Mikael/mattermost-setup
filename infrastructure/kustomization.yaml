apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - sealed-secrets/
  - metallb/
  - nginx-ingress/
  - cert-manager/
  - mattermost-operator/
# NOTE: metallb-config/ and cert-manager-config/ are NOT listed here.
# They are applied by separate Flux Kustomizations AFTER this one
# to avoid CRD timing errors.
